<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물류센터 로그인</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
<div class="container login-container">
    <h2>📦 물류센터 출입명부</h2>
    <p class="subtitle">GET 방식으로 전송해봅시다!</p>

    <form action="http://localhost:8000/users/login" method="GET">
        <div class="input-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="admin@test.com" required>
        </div>

        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="login-btn">출입 요청</button>
    </form>
</div>
</body>
</html>
